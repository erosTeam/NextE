# One-time SSH-triggered migration. Remove this workflow after the historical sync succeeds.
name: Sync Historical Release Notes

on:
  push:
    branches:
      - release-notes-sync

permissions:
  contents: write

jobs:
  sync:
    name: Update release bodies only
    if: github.ref == 'refs/heads/release-notes-sync'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update and verify release bodies
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          notes=(changelog/v*.md)
          test "${#notes[@]}" -gt 0
          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          missing=()
          failed=()
          updated=()

          for file in "${notes[@]}"; do
            tag="${file##*/}"
            tag="${tag%.md}"
            case "$tag" in
              v[0-9]*.[0-9]*.[0-9]*) ;;
              *) echo "Invalid release notes filename: $file" >&2; exit 1 ;;
            esac
            test -s "$file"

            if ! release_json=$(curl --fail-with-body --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              "$api_root/releases/tags/$tag"); then
              missing+=("$tag")
              continue
            fi

            if ! release_id=$(jq -er --arg tag "$tag" 'select(.tag_name == $tag) | .id' <<< "$release_json"); then
              failed+=("$tag")
              continue
            fi

            request_body=$(jq -n --rawfile body "$file" '{body: $body}')
            if ! updated_json=$(curl --fail-with-body --silent --show-error \
                -X PATCH \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$request_body" \
                "$api_root/releases/$release_id"); then
              failed+=("$tag")
              continue
            fi

            if [[ "$(jq -er '.body' <<< "$updated_json")" != "$(<"$file")" ]]; then
              failed+=("$tag")
              continue
            fi
            updated+=("$tag")
          done

          echo "Updated releases: ${#updated[@]}"
          if ((${#missing[@]} > 0)); then
            printf 'Missing releases: %s\n' "${missing[*]}"
          fi
          if ((${#failed[@]} > 0)); then
            printf 'Failed releases: %s\n' "${failed[*]}"
          fi
          if ((${#missing[@]} > 0 || ${#failed[@]} > 0)); then
            exit 1
          fi
